<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Staff · Buscar persona</title>

  <link rel="icon" href="./icons/icon.png" type="image/png" />

  <style>
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin:0;
      background:#0b1220;
      color:#e5e7eb;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h1{ font-size:20px; margin:0; }
    .muted{ color:#9ca3af; font-size:14px; }

    .btn{
      padding: 10px 12px;
      border-radius: 12px;
      border:1px solid #334155;
      background:#0f172a;
      color:#e5e7eb;
      cursor:pointer;
      font-weight:700;
    }

    .btn.primary{ background:#2563eb; border-color:#1d4ed8; color:#fff; }
    .btn.danger{ background:#2a0a0a; border-color:#7f1d1d; color:#fff; }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 920px){
      .grid{ grid-template-columns: 1.15fr 0.85fr; align-items:start; }
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius: 14px;
      padding: 14px;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    input{
      flex:1;
      min-width:240px;
      padding: 10px 12px;
      border-radius: 12px;
      border:1px solid #334155;
      background:#0f172a;
      color:#e5e7eb;
      outline:none;
      font-size:16px;
    }

    .error{
      display:none;
      background:#2a0a0a;
      border:1px solid #7f1d1d;
      border-radius:12px;
      padding:12px;
      white-space:pre-wrap;
      margin-top: 10px;
    }

    .ok{
      display:none;
      background:#052e1a;
      border:1px solid #14532d;
      border-radius:12px;
      padding:12px;
      white-space:pre-wrap;
      margin-top: 10px;
    }

    .badge{
      display:inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      border:1px solid #334155;
    }

    .okb{ background:#052e1a; border-color:#14532d; }
    .warn{ background:#2a1d05; border-color:#78350f; }
    .bad{ background:#2a0a0a; border-color:#7f1d1d; }

    .list{
      margin-top: 14px;
      display:grid;
      gap:10px;
      max-height: 65vh;
      overflow:auto;
      padding-right: 4px;
    }

    .person-item{
      background:#0f172a;
      border:1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      cursor:pointer;
      transition: border-color .15s ease, transform .08s ease;
    }

    .person-item:hover{
      border-color:#60a5fa;
    }

    .person-item.active{
      border-color:#2563eb;
      box-shadow: 0 0 0 1px rgba(37,99,235,.3) inset;
    }

    .person-title{
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .person-meta{
      color:#9ca3af;
      font-size:14px;
      display:grid;
      gap:4px;
    }

    .ticket{
      width:100%;
      border-radius: 16px;
      border:1px solid #1f2937;
      background:#0f172a;
      padding: 16px;
      box-sizing: border-box;
    }

    .info .label{
      color:#9ca3af;
      font-size: 13px;
      margin-top: 10px;
    }

    .info .value{
      font-size:16px;
      margin-top:2px;
      word-break: break-word;
    }

    .actions{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      margin-top: 12px;
    }

    @media (min-width: 920px){
      .actions{ grid-template-columns: 1fr 1fr; }
    }

    .empty{
      color:#9ca3af;
      border:1px dashed #334155;
      border-radius:12px;
      padding:16px;
      text-align:center;
      margin-top: 12px;
    }

    .loading{
      display:none;
      margin-top: 12px;
      color:#9ca3af;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>👤 Staff · Buscar por persona</h1>
        <div class="muted" id="subtitle">Escribe un nombre o No. boleto para buscar.</div>
      </div>

      <div class="row">
        <button class="btn" id="reloadBtn">Actualizar</button>
        <button class="btn" id="goScanBtn">Ir al escáner</button>
        <button class="btn" id="logoutBtn">Salir</button>
      </div>
    </div>

    <div class="grid">
      <!-- Búsqueda -->
      <div class="card">
        <div class="row">
          <input id="searchInput" placeholder="Buscar por nombre, No. boleto o ticket ID" autocomplete="off" />
          <button class="btn primary" id="clearSearchBtn">Limpiar</button>
        </div>

        <div id="loadingBox" class="loading">Sincronizando lista…</div>
        <div id="okBox" class="ok"></div>
        <div id="errorBox" class="error"></div>

        <div class="muted" style="margin-top:12px;">
          Si hay personas repetidas, compáralas por No. boleto, fecha/hora y estado.
        </div>

        <div id="resultsInfo" class="muted" style="margin-top:12px;"></div>
        <div id="resultsBox" class="list"></div>
        <div id="emptyBox" class="empty" style="display:none;">No hay coincidencias.</div>
      </div>

      <!-- Detalle -->
      <div class="card">
        <div class="ticket" id="ticketBox" style="display:none;">
          <div class="info">
            <div class="label">Estatus</div>
            <div class="value" id="tStatus"></div>

            <div class="label">Nombre</div>
            <div class="value" id="tNombre"></div>

            <div class="label">No. boleto</div>
            <div class="value" id="tBoletoNo"></div>

            <div class="label">Fecha y hora</div>
            <div class="value" id="tFechaHora"></div>

            <div class="label">Ticket ID</div>
            <div class="value" id="tTicketId"></div>

            <div class="label">Token</div>
            <div class="value" id="tToken"></div>
          </div>
        </div>

        <div class="actions" id="actionsBox" style="display:none;">
          <button class="btn primary" id="btnCheckin">Marcar llegada</button>
          <button class="btn" id="btnDeseleccionar">Deseleccionar</button>
        </div>

        <div id="detailEmpty" class="empty">
          Selecciona una persona para ver su información.
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzTkkTvBNJ6WpVVsrHyWoplIXF3B2E3R1qLIec0m14Z8gC_o7r987xb02Jofnd5BYFq/exec";

    const AUTH_KEY = "staffAuthOk";
    const AUTH_TS_KEY = "staffAuthTs";
    const PIN_KEY = "staffPin";
    const AUTH_TTL_MS = 8 * 60 * 60 * 1000;
    const SYNC_MS = 8000;

    let ticketsCache = [];
    let filteredCache = [];
    let currentToken = "";
    let syncTimer = null;
    let syncing = false;
    let msgTimer = null;

    const $ = (id) => document.getElementById(id);

    function setText_(id, txt){
      const el = $(id);
      if (el) el.textContent = txt;
    }

    function setHTML_(id, html){
      const el = $(id);
      if (el) el.innerHTML = html;
    }

    function setDisplay_(id, value){
      const el = $(id);
      if (el) el.style.display = value;
    }

    function autoHideMsgs_(ms = 3000){
      if (msgTimer) clearTimeout(msgTimer);

      msgTimer = setTimeout(() => {
        const er = $("errorBox");
        const ok = $("okBox");

        if (er) {
          er.style.display = "none";
          er.textContent = "";
        }

        if (ok) {
          ok.style.display = "none";
          ok.textContent = "";
        }
      }, ms);
    }

    function showError(msg){
      const er = $("errorBox");
      const ok = $("okBox");

      if (er){
        er.style.display = "block";
        er.textContent = msg;
      }

      if (ok){
        ok.style.display = "none";
        ok.textContent = "";
      }

      autoHideMsgs_(4000);
    }

    function showOk(msg){
      const ok = $("okBox");
      const er = $("errorBox");

      if (ok){
        ok.style.display = "block";
        ok.textContent = msg;
      }

      if (er){
        er.style.display = "none";
        er.textContent = "";
      }

      autoHideMsgs_(3000);
    }

    function clearMsgs(){
      if (msgTimer) {
        clearTimeout(msgTimer);
        msgTimer = null;
      }

      const er = $("errorBox");
      const ok = $("okBox");

      if (er){
        er.style.display = "none";
        er.textContent = "";
      }

      if (ok){
        ok.style.display = "none";
        ok.textContent = "";
      }
    }

    function setLoading_(on, msg){
      const el = $("loadingBox");
      if (!el) return;
      el.style.display = on ? "block" : "none";
      el.textContent = msg || "Sincronizando lista…";
    }

    function isAuthValid_(){
      const ok = sessionStorage.getItem(AUTH_KEY) === "1";
      const ts = Number(sessionStorage.getItem(AUTH_TS_KEY) || "0");
      return ok && ts && (Date.now() - ts) < AUTH_TTL_MS;
    }

    function touchAuth_(){
      if (sessionStorage.getItem(AUTH_KEY) === "1") {
        sessionStorage.setItem(AUTH_TS_KEY, String(Date.now()));
      }
    }

    function clearAuth_(){
      sessionStorage.removeItem(AUTH_KEY);
      sessionStorage.removeItem(AUTH_TS_KEY);
      sessionStorage.removeItem(PIN_KEY);
    }

    function enforceAuthOrRedirect_(){
      if (!isAuthValid_()){
        clearAuth_();
        location.replace("./index.html");
        return false;
      }
      touchAuth_();
      return true;
    }

    function logout_(){
      stopSync_();
      clearAuth_();
      location.replace("./index.html");
    }

    async function ensurePin_(){
      let pin = sessionStorage.getItem(PIN_KEY);
      if (pin) return pin;

      pin = prompt("Ingresa el PIN del staff:");
      if (!pin) throw new Error("PIN requerido.");
      pin = String(pin).trim();
      sessionStorage.setItem(PIN_KEY, pin);
      return pin;
    }

    function normalize_(txt){
      return String(txt || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function badgeHtml_(status){
      const s = String(status || "").toUpperCase();
      let cls = "badge";
      let label = s || "DESCONOCIDO";

      if (s === "ISSUED") { cls += " okb"; label = "VÁLIDO"; }
      else if (s === "USED") { cls += " warn"; label = "YA USADO"; }
      else if (s === "CANCELED" || s === "EXPIRED") { cls += " bad"; }
      else { cls += " bad"; }

      return `<span class="${cls}">${label}</span>`;
    }

    function updateCheckinButton_(status){
      const s = String(status || "").toUpperCase();
      const btn = $("btnCheckin");
      if (!btn) return;

      const isUsed = s === "USED";
      const isInvalid = s === "CANCELED" || s === "EXPIRED";

      if (isUsed || isInvalid) {
        btn.disabled = true;
        btn.textContent = isUsed ? "Ya utilizado" : "No válido";
        btn.classList.add("danger");
      } else {
        btn.disabled = false;
        btn.textContent = "Marcar llegada";
        btn.classList.remove("danger");
      }
    }

    async function apiListTicketsLite(pin){
      const res = await fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({
          action: "listTicketsLite",
          pin
        })
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error("Respuesta no JSON: " + text); }

      return data;
    }

    async function apiCheckin(token, pin){
      const res = await fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({
          action: "checkin",
          token,
          pin
        })
      });

      const text = await res.text();
      let data;
      try { data = JSON.parse(text); }
      catch { throw new Error("Respuesta no JSON: " + text); }

      return data;
    }

    function escapeHtml_(text){
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderResults_(items){
      const box = $("resultsBox");
      if (!box) return;

      box.innerHTML = "";
      setText_("resultsInfo", `${items.length} resultado(s)`);

      if (!items.length){
        setDisplay_("emptyBox", "block");
        return;
      }

      setDisplay_("emptyBox", "none");

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "person-item" + (item.token === currentToken ? " active" : "");

        div.innerHTML = `
          <div class="person-title">${escapeHtml_(item.nombre || "Sin nombre")}</div>
          <div class="person-meta">
            <div>No. boleto: ${escapeHtml_(item.boletoNo || "-")}</div>
            <div>Fecha y hora: ${escapeHtml_(item.fechaHora || "-")}</div>
            <div>Ticket ID: ${escapeHtml_(item.ticketId || "-")}</div>
            <div style="margin-top:6px;">${badgeHtml_(item.estatus)}</div>
          </div>
        `;

        div.addEventListener("click", () => {
          selectTicket_(item.token);
        });

        box.appendChild(div);
      });
    }

    function applySearch_(){
      const q = normalize_( $("searchInput")?.value || "" );

      if (!q){
        filteredCache = [...ticketsCache];
      } else {
        filteredCache = ticketsCache.filter(item => {
          const nombre = normalize_(item.nombre);
          const boletoNo = normalize_(item.boletoNo);
          const ticketId = normalize_(item.ticketId);
          const fechaHora = normalize_(item.fechaHora);

          return (
            nombre.includes(q) ||
            boletoNo.includes(q) ||
            ticketId.includes(q) ||
            fechaHora.includes(q)
          );
        });
      }

      renderResults_(filteredCache);
    }

    function selectTicket_(token){
      currentToken = token;
      const item = ticketsCache.find(x => x.token === token);
      if (!item) return;

      setDisplay_("ticketBox", "block");
      setDisplay_("actionsBox", "grid");
      setDisplay_("detailEmpty", "none");

      setHTML_("tStatus", badgeHtml_(item.estatus));
      setText_("tNombre", item.nombre || "-");
      setText_("tBoletoNo", item.boletoNo || "-");
      setText_("tFechaHora", item.fechaHora || "-");
      setText_("tTicketId", item.ticketId || "-");
      setText_("tToken", item.token || "-");

      updateCheckinButton_(item.estatus);
      applySearch_();
    }

    function clearSelection_(){
      currentToken = "";
      setDisplay_("ticketBox", "none");
      setDisplay_("actionsBox", "none");
      setDisplay_("detailEmpty", "block");

      setHTML_("tStatus", "");
      setText_("tNombre", "");
      setText_("tBoletoNo", "");
      setText_("tFechaHora", "");
      setText_("tTicketId", "");
      setText_("tToken", "");

      applySearch_();
    }

    function mergeItems_(items){
      ticketsCache = Array.isArray(items) ? items.slice() : [];

      ticketsCache.sort((a, b) => {
        const nameCmp = String(a.nombre || "").localeCompare(String(b.nombre || ""), "es", { sensitivity: "base" });
        if (nameCmp !== 0) return nameCmp;
        return String(a.boletoNo || "").localeCompare(String(b.boletoNo || ""), "es", { sensitivity: "base" });
      });
    }

    async function syncTickets_(showToast = false){
      if (!enforceAuthOrRedirect_()) return;
      if (syncing) return;

      syncing = true;
      setLoading_(true, "Sincronizando lista…");

      try {
        const pin = await ensurePin_();
        const r = await apiListTicketsLite(pin);

        if (!r.ok){
          if (r.error === "INVALID_PIN") sessionStorage.removeItem(PIN_KEY);
          throw new Error(r.error || "No se pudo sincronizar.");
        }

        mergeItems_(r.items || []);
        applySearch_();

        if (currentToken) {
          const stillExists = ticketsCache.find(x => x.token === currentToken);
          if (stillExists) selectTicket_(currentToken);
          else clearSelection_();
        }

        touchAuth_();
        setText_("subtitle", `Lista sincronizada · ${r.count || 0} registros`);
        if (showToast) showOk("✅ Lista actualizada.");
      } catch (e) {
        console.error(e);
        showError("Error al sincronizar: " + (e?.message || e));
      } finally {
        setLoading_(false);
        syncing = false;
      }
    }

    async function doCheckin_(){
      if (!enforceAuthOrRedirect_()) return;
      if (!currentToken) {
        showError("Selecciona una persona primero.");
        return;
      }

      const btn = $("btnCheckin");
      if (btn?.disabled) return;

      try {
        clearMsgs();
        btn.disabled = true;
        btn.textContent = "Marcando…";

        const pin = await ensurePin_();
        const r = await apiCheckin(currentToken, pin);

        if (!r.ok){
          if (r.error === "INVALID_PIN") sessionStorage.removeItem(PIN_KEY);
          throw new Error(r.error || "No se pudo marcar llegada.");
        }

        const idx = ticketsCache.findIndex(x => x.token === currentToken);
        if (idx >= 0 && r.ticket) {
          ticketsCache[idx] = {
            ...ticketsCache[idx],
            boletoNo: r.ticket.boletoNo || ticketsCache[idx].boletoNo,
            ticketId: r.ticket.ticketId || ticketsCache[idx].ticketId,
            token: r.ticket.token || ticketsCache[idx].token,
            nombre: r.ticket.nombre || ticketsCache[idx].nombre,
            estatus: r.ticket.estatus || ticketsCache[idx].estatus,
            fechaHora: r.ticket.fechaHora || ticketsCache[idx].fechaHora
          };
        } else if (idx >= 0) {
          ticketsCache[idx] = { ...ticketsCache[idx], estatus: "USED" };
        }

        applySearch_();
        selectTicket_(currentToken);
        showOk(r.alreadyUsed ? "⚠️ Este pase ya estaba usado." : "✅ Llegada marcada.");

        setTimeout(() => syncTickets_(false), 500);
      } catch (e) {
        console.error(e);
        showError("Error en check-in: " + (e?.message || e));
      } finally {
        const item = ticketsCache.find(x => x.token === currentToken);
        updateCheckinButton_(item?.estatus || "");
      }
    }

    function startSync_(){
      stopSync_();
      syncTimer = setInterval(() => {
        syncTickets_(false);
      }, SYNC_MS);
    }

    function stopSync_(){
      if (syncTimer) {
        clearInterval(syncTimer);
        syncTimer = null;
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        syncTickets_(false);
      }
    });

    document.addEventListener("DOMContentLoaded", async () => {
      if (!enforceAuthOrRedirect_()) return;

      $("logoutBtn")?.addEventListener("click", logout_);

      $("goScanBtn")?.addEventListener("click", () => {
        stopSync_();
        location.href = "./staff-scan.html";
      });

      $("reloadBtn")?.addEventListener("click", () => syncTickets_(true));

      $("clearSearchBtn")?.addEventListener("click", () => {
        $("searchInput").value = "";
        applySearch_();
        clearMsgs();
      });

      $("searchInput")?.addEventListener("input", applySearch_);
      $("btnCheckin")?.addEventListener("click", doCheckin_);
      $("btnDeseleccionar")?.addEventListener("click", clearSelection_);

      await syncTickets_(false);
      startSync_();

      window.addEventListener("beforeunload", stopSync_);
    });
  </script>
</body>
</html>
